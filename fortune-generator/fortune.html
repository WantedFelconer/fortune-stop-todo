<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune Generator - Material You</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@400;500&family=Playfair+Display:ital,wght@0,400;1,400&family=Space+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-app-bar">
        <div class="header-content">
            <span class="material-symbols-outlined icon-brand">auto_awesome</span>
            <h1>Fortune Generator</h1>
        </div>
    </header>

    <main class="main-container">
        <div class="interactive-zone">
            <div id="fortune-box" class="fortune-card">
                <p id="fortune-text">Loading your destiny...</p>
            </div>

            <div class="controls-grid">
                <button id="btn-theme-1" class="md-btn btn-green" title="Apply Nature Palette">
                    <span class="material-symbols-outlined">palette</span>
                </button>
                <button id="btn-theme-2" class="md-btn btn-yellow" title="Apply Sunset Palette">
                    <span class="material-symbols-outlined">palette</span>
                </button>
                <button id="btn-theme-3" class="md-btn btn-blue" title="Apply Ocean Palette">
                    <span class="material-symbols-outlined">palette</span>
                </button>
                <button id="btn-theme-4" class="md-btn btn-orange" title="Apply Classic Palette">
                    <span class="material-symbols-outlined">palette</span>
                </button>
            </div>

        </div>
    </main>

    <footer class="page-footer">
        <p>&copy; 2026 Wisdom Co. &bull; Generate Your Fortune</p>
    </footer>
        <script src="script.js"></script>
</body>
</html>
